<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/login.css"/>
</head>
<body>

  <div class="card">
    <h1>Restricted Access</h1>
    <p class="sub">Authorized personnel only.</p>

    <div class="error" th:if="${error}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="#b00020" stroke-width="1.4"/>
        <line x1="8" y1="5" x2="8" y2="9" stroke="#b00020" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="8" cy="11.25" r=".8" fill="#b00020"/>
      </svg>
      <span th:text="${error}">Incorrect credentials.</span>
    </div>

    <form id="loginForm" method="post" th:action="@{/login}">
      <div class="fg">
        <label for="username">Username <span>Administrator account</span></label>
        <div class="iw">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M2.5 13.5c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required/>
        </div>
      </div>
      <div class="fg">
        <label for="password">Password</label>AdminAa1!23dmin
        <div class="iw">
          <svg viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="10.5" r=".9" fill="currentColor"/></svg>
          <input id="password" name="password" type="password" autocomplete="current-password" required/>
        </div>
      </div>
      <button type="submit" id="btn">
        <svg class="bi" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M9 5l3 3-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="bl">Sign In</span>
      </button>
    </form>

    <div class="cf">
      <span>Access issues?</span>
      <a href="#">Contact support</a>
    </div>
  </div>

</body>
</html>
