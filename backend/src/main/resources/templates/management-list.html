<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="'List of ' + ${entityName}">List</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="/css/management-list.css"/>
</head>
<body>
  <div class="management-layout">
    <header class="header">
      <h1 class="title in-line-block" th:text="'Manage ' + ${entityName}">List</h1>
      <a href="/" class="btn alt">Back to dashboard</a>
    </header>

    <main class="container-fluid management-main" th:with="isReadOnly=${entityKey == 'orders' or entityKey == 'order-items' or entityKey == 'user-favorites' or entityKey == 'carts' or entityKey == 'cart-items'}">
      
      <div th:if="${entityKey == 'products'}" class="search-container mb-4">
        <form th:action="@{/manage/products/list}" method="get" class="search-form">
          <div class="search-input-wrapper">
            <i class="bi bi-search search-icon"></i>
            <input type="text" name="search" th:value="${searchQuery}" placeholder="Search products by name or description..." class="search-input"/>
            <button type="submit" class="btn btn-search">Search</button>
            <a th:if="${searchQuery != null}" th:href="@{/manage/products/list}" class="btn-action btn-delete-btn" title="Clear search">
              <i class="bi bi-x-lg"></i>
            </a>
          </div>
        </form>
      </div>

      <div th:if="${not #lists.isEmpty(items)}" class="table-container">
        <table th:with="keys=${items[0].keySet()}">
          <thead>
            <tr>
              <th th:each="key : ${keys}" th:text="${key}">Key</th>
              <th class="actions-column">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="item : ${items}" th:class="${editId == item.id} ? 'row-editing' : 'row-normal'">
              
              <th:block th:if="${editId != item.id}">
                <td th:each="key : ${keys}" th:text="${item.get(key)}"></td>
                <td class="table-action-cell">
                  <div th:if="${!isReadOnly}" class="actions-row">
                    <a th:href="@{/manage/{e}/list(e=${entityKey}, editId=${item.id}, search=${searchQuery})}" class="btn-action btn-edit-link" title="Edit">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <form method="post" th:action="@{/manage/{e}/delete(e=${entityKey})}" onsubmit="return confirm('Are you sure you want to delete?');">
                      <input type="hidden" name="id" th:value="${item.id}"/>
                      <button type="submit" class="btn-action btn-delete-btn" title="Delete">
                        <i class="bi bi-x-lg"></i>
                      </button>
                    </form>
                  </div>
                  <span th:if="${isReadOnly}" class="text-muted readonly-text">Read-only</span>
                </td>
              </th:block>
              
              <th:block th:if="${editId == item.id and !isReadOnly}">
                <td th:each="key : ${keys}">
                  <form th:if="${key == 'id'}" th:id="'form-' + ${item.id}" 
                        th:action="@{/manage/{e}/update(e=${entityKey})}" method="post" class="hidden-form"></form>

                  <span th:if="${key == 'id'}" th:text="${item.id}"></span>
                  <input th:if="${key == 'id'}" type="hidden" name="id" th:value="${item.id}" th:form="'form-' + ${item.id}"/>

                  <th:block th:if="${key != 'id'}">
                      <select th:if="${key == 'category_id' and allCategories != null}" 
                              th:name="${key}" th:form="'form-' + ${item.id}" class="select-edit">
                        <option th:each="cat : ${allCategories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.id + ' - ' + cat.name}"
                                th:selected="${cat.id == item.get(key)}"></option>
                      </select>

                      <div th:if="${key != 'category_id' and item.get(key) instanceof T(java.lang.Boolean)}" class="checkbox-row">
                        <input type="checkbox" th:name="${key}" value="true"
                              th:form="'form-' + ${item.id}" th:checked="${item.get(key)}"/>
                        <input type="hidden" th:name="'_' + ${key}" value="on" th:form="'form-' + ${item.id}"/>
                      </div>
                      
                      <input th:if="${key != 'category_id' and item.get(key) instanceof T(java.lang.Number) and !(item.get(key) instanceof T(java.lang.Boolean))}" 
                            type="number" step="any" th:name="${key}" th:value="${item.get(key)}"
                            th:form="'form-' + ${item.id}"/>
                      
                      <input th:if="${key != 'category_id' and !(item.get(key) instanceof T(java.lang.Number)) and !(item.get(key) instanceof T(java.lang.Boolean))}" 
                            type="text" th:name="${key}" th:value="${item.get(key)}"
                            th:form="'form-' + ${item.id}"/>
                  </th:block>
                </td>
                <td class="table-action-cell">
                  <div class="actions-row">
                    <button type="submit" th:form="'form-' + ${item.id}" class="btn-action btn-save" title="Save">
                      <i class="bi bi-check-circle"></i>
                    </button>
                    <a th:href="@{/manage/{e}/list(e=${entityKey}, search=${searchQuery})}" class="btn-action btn-cancel" title="Cancel">
                      <i class="bi bi-x-lg"></i>
                    </a>
                  </div>
                </td>
              </th:block>
            </tr>
          </tbody>
        </table>
      </div>
      <div th:if="${#lists.isEmpty(items)}">
        <p th:if="${searchQuery == null}">No items to display.</p>
        <p th:if="${searchQuery != null}">No products found matching "<span th:text="${searchQuery}"></span>".</p>
      </div>
    </main>
  </div>
</body>
</html>
